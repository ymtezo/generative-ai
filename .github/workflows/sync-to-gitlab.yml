name: Sync to GitLab

on:
  push:
    branches: ["*"]
    tags: ["*"]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

      - name: Push all branches and tags to GitLab
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_REPO: ${{ secrets.GITLAB_REPO }}
        run: |
          git remote remove gitlab 2>/dev/null || true

          # Create authenticated GitLab URL
          AUTH_URL="https://oauth2:${GITLAB_TOKEN}@${GITLAB_REPO#https://}"

          # Convert all remote tracking branches to local branches (origin/xxx -> xxx)
          # This avoids the "refs/remotes/origin/* cannot be pushed" error
          git branch -r | grep -v '\->' | while read remote; do
            branch="${remote#origin/}"
            git branch -f "$branch" "$remote" 2>/dev/null || true
          done

          # Force push all branches and tags
          git push --all --force "$AUTH_URL"
          git push --tags --force "$AUTH_URL"
